<!-- 练习5：定位（特殊布局需求的解决方案） -->
<!-- 20/80原则：relative/absolute/fixed 覆盖了80%的定位场景 -->
<!--
要求：
1. 理解position: static（默认）和 relative 的区别
2. 使用relative进行相对定位，不脱离文档流
3. 使用absolute进行绝对定位，相对于最近的定位祖先
4. 使用fixed固定元素在视口位置
5. 使用z-index控制层叠顺序
6. 理解定位上下文（positioned ancestor）
-->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定位练习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            padding: 20px;
            height: 200vh; /* 让页面可滚动 */
        }

        .box {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        /* 任务1：设置.relative-box
             position: relative
             left: 50px
             top: 20px
             背景色: #3498db
        */


        /* 任务2：设置.container为定位上下文
             position: relative
             背景色: #ecf0f1
             padding: 20px
             height: 200px
        */
        .container {

        }

        /* 任务3：设置.absolute-box
             position: absolute
             right: 20px
             top: 20px
             背景色: #e74c3c
        */


        /* 任务4：设置.fixed-box
             position: fixed
             right: 20px
             bottom: 20px
             背景色: #2ecc71
        */

    </style>
</head>
<body>
    <h2>相对定位 (relative)</h2>
    <p>相对于元素原来的位置偏移，不脱离文档流。</p>
    <div class="box relative-box">relative</div>
    <p>后面的内容...</p>

    <h2>绝对定位 (absolute)</h2>
    <p>相对于最近的定位祖先元素，脱离文档流。</p>
    <div class="container">
        <p>我是容器（设置了position: relative）</p>
        <div class="box absolute-box">absolute</div>
    </div>

    <h2>固定定位 (fixed)</h2>
    <p>相对于视口固定位置，不随滚动移动。</p>
    <div class="box fixed-box">fixed</div>
</body>
</html>
