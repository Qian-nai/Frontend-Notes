<!-- Flexbox布局示例 -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Flexbox布局</title>
    <style>
        .container {
            display: flex;
            /* 主轴方向：row（默认）| row-reverse | column | column-reverse */
            flex-direction: row;
            /* 主轴对齐方式 */
            justify-content: space-between;
            /* 交叉轴对齐方式 */
            align-items: center;
            /* 是否换行 */
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
            background-color: #f0f0f0;
        }

        .item {
            /* flex: flex-grow flex-shrink flex-basis */
            flex: 1 1 200px;
            padding: 20px;
            background-color: #3498db;
            color: white;
            text-align: center;
            border-radius: 8px;
        }

        .item:nth-child(2) {
            /* 该元素占据更多空间 */
            flex: 2 1 200px;
            background-color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">项目 1</div>
        <div class="item">项目 2（占据更多空间）</div>
        <div class="item">项目 3</div>
    </div>
</body>
</html>
