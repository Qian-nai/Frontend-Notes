<!-- Grid布局示例 -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Grid布局</title>
    <style>
        .grid-container {
            display: grid;
            /* 定义三列，中间列宽度自适应 */
            grid-template-columns: 200px 1fr 200px;
            /* 定义两行，高度分别为auto和200px */
            grid-template-rows: auto 200px;
            /* 间距 */
            gap: 20px;
            padding: 20px;
        }

        .header {
            /* 跨越三列 */
            grid-column: 1 / -1;
            background-color: #3498db;
            padding: 20px;
            color: white;
        }

        .sidebar {
            background-color: #2ecc71;
            padding: 20px;
        }

        .main {
            background-color: #ecf0f1;
            padding: 20px;
        }

        .aside {
            background-color: #e74c3c;
            padding: 20px;
        }

        .footer {
            grid-column: 1 / -1;
            background-color: #95a5a6;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <header class="header">头部</header>
        <aside class="sidebar">左侧栏</aside>
        <main class="main">主内容区</main>
        <aside class="aside">右侧栏</aside>
        <footer class="footer">底部</footer>
    </div>
</body>
</html>
