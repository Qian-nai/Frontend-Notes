<!-- 练习6：HTML5语义化标签（现代Web开发必备） -->
<!-- 20/80原则：header、nav、main、section、article、aside、footer 是语义化的核心 -->
<!--
要求：
1. 使用header作为页面头部
2. 使用nav包裹导航链接
3. 使用main包裹页面主要内容（一个页面只能有一个）
4. 使用section划分内容区块
5. 使用article包裹独立的、完整的内容
6. 使用aside作为侧边栏
7. 使用footer作为页面底部
8. 正确使用标题层级（h1-h3）
-->

        /* 基础样式 */
        header { background: #2c3e50; color: white; padding: 20px; }
        nav a { color: white; margin-right: 15px; text-decoration: none; }
        main { max-width: 800px; margin: 0 auto; padding: 20px; }
        section { margin-bottom: 30px; }
        h1 { margin: 0; }
        h2 { border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        footer { background: #34495e; color: white; text-align: center; padding: 20px; }
    </style>
</head>
<body>
