<!-- 练习1答案：CSS选择器 -->
<!-- 核心知识点：
  1. 元素选择器：直接写标签名，选中所有该标签
     p { } 选中所有段落

  2. 类选择器：.className，选中所有带有该class的元素
     .highlight { } 选中class="highlight"的元素
     一个元素可以有多个类：class="highlight important"

  3. ID选择器：#idName，选中带有该id的元素
     #title { } 选中id="title"的元素
     一个页面中id应该唯一

  4. 后代选择器：parent child，选中parent内的所有child（无论嵌套多深）
     .content p { } 选中.content内的所有p

  5. 子元素选择器：parent > child，只选中直接子元素
     .content > p { } 只选中.content的直接子p

  6. 分组选择器：selector1, selector2，同时选中多个
     h1, h2, h3 { } 同时选中三种标题

  7. 伪类：:hover, :focus, :active, :nth-child()
     a:hover { } 鼠标悬停时的链接
     li:nth-child(odd) { } 奇数项

  选择器优先级（权重）：
  ID选择器(100) > 类选择器(10) > 元素选择器(1) > 通用选择器(0)
  !important 可以覆盖一切（尽量不用）
-->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择器练习</title>
    <style>
        /* 元素选择器：选中所有p标签 */
        p {
            color: #333;
            line-height: 1.6;
        }

        /* 类选择器：选中class="highlight"的元素 */
        .highlight {
            background-color: #fff3cd;
            padding: 10px;
            border-radius: 4px;
        }

        /* ID选择器：选中id="title"的元素 */
        #title {
            font-size: 32px;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        /* 后代选择器：选中.content内的所有p */
        .content p {
            text-indent: 2em;
        }

        /* 分组选择器：同时设置多个元素 */
        h1, h2, h3 {
            font-family: 'Microsoft YaHei', sans-serif;
        }

        /* 伪类：悬停效果 */
        a {
            color: #3498db;
            text-decoration: none;
            transition: color 0.3s;
        }

        a:hover {
            color: #e74c3c;
            text-decoration: underline;
        }

        /* 拓展：其他常用伪类 */
        /* 第一个子元素 */
        .content p:first-child {
            font-weight: bold;
        }

        /* 奇数项（隔行变色） */
        ul li:nth-child(odd) {
            background: #f5f5f5;
        }
    </style>
</head>
<body>
    <h1 id="title">CSS选择器基础</h1>

    <div class="intro">
        <p>选择器是CSS的核心，用于选中页面中的元素。</p>
    </div>

    <div class="content">
        <h2>基础选择器</h2>
        <p>元素选择器选中所有指定标签。</p>
        <p class="highlight">类选择器选中带有指定class的元素。</p>

        <h2>组合选择器</h2>
        <p>后代选择器可以选中嵌套在指定元素内的元素。</p>
        <p>了解更多：<a href="#">CSS选择器参考</a></p>
    </div>
</body>
</html>
