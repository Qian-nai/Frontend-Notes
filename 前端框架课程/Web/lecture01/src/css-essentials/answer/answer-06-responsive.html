<!-- 练习6答案：响应式设计 -->
<!-- 核心知识点：
  响应式设计的核心是让网页能够自适应不同设备和屏幕尺寸。

  1. Viewport设置
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     - width=device-width：视口宽度等于设备宽度
     - initial-scale=1.0：初始缩放比例为1
     - 这是响应式设计的基石，缺少它移动端会以桌面宽度渲染

  2. 媒体查询（Media Queries）
     @media (条件) { /* 样式 */ }

     常用断点：
     - 手机：< 576px
     - 平板：576px - 768px
     - 桌面：768px - 992px
     - 大屏：> 992px

     常用条件：
     - max-width：最大宽度（小于等于）
     - min-width：最小宽度（大于等于）
     - orientation: portrait/landscape（方向）

  3. 流式布局技巧
     - 使用max-width而非固定width
     - 使用百分比宽度
     - 使用flex-wrap允许换行
     - 图片设置max-width: 100%

  4. 相对单位
     - px：绝对单位，不随屏幕变化
     - rem：相对于根元素(html)的字体大小，推荐用于文字
     - em：相对于父元素的字体大小，推荐用于padding/margin
     - vw/vh：视口宽/高的百分比

  5. 移动优先 vs 桌面优先
     - 移动优先：先写移动端样式，再用min-width添加桌面端样式（推荐）
     - 桌面优先：先写桌面端样式，再用max-width添加移动端样式

  6. 响应式图片
     - max-width: 100%：图片不超过容器宽度
     - height: auto：保持宽高比
     - srcset属性：根据屏幕密度提供不同尺寸
     - picture元素：根据条件选择不同图片

  7. 隐藏/显示技巧
     - display: none / block 完全隐藏/显示
     - visibility: hidden 隐藏但保留空间
     - opacity: 0 透明但可交互
-->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 视口设置：响应式设计的基石 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>响应式设计练习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* 基础样式（移动优先） */
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            font-size: 16px;
        }

        /* 流式容器 */
        .container {
            max-width: 1200px;  /* 最大宽度限制 */
            margin: 0 auto;     /* 水平居中 */
            padding: 0 20px;    /* 两侧留白 */
        }

        h1 {
            font-size: 1.5rem;  /* 移动端字号 */
            margin: 20px 0;
            color: #2c3e50;
        }

        /* 响应式Flex布局 */
        .card-list {
            display: flex;
            flex-wrap: wrap;    /* 允许换行 */
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            flex: 1 1 100%;     /* 移动端：单列（100%宽度） */
            background: #ecf0f1;
            padding: 20px;
            border-radius: 8px;
        }

        .card h2 {
            color: #3498db;
            margin-bottom: 10px;
            font-size: 1.25rem;
        }

        .card p {
            color: #666;
        }

        /* 平板端（576px以上） */
        @media (min-width: 576px) {
            .card {
                flex: 1 1 calc(50% - 10px);  /* 两列布局 */
            }
        }

        /* 桌面端（768px以上） */
        @media (min-width: 768px) {
            h1 {
                font-size: 2rem;  /* 桌面端大标题 */
            }

            .card {
                flex: 1 1 calc(33.333% - 14px);  /* 三列布局 */
            }
        }

        /* 拓展：导航栏响应式 */
        .nav {
            background: #2c3e50;
            padding: 15px;
            margin-bottom: 20px;
        }

        .nav-list {
            display: flex;
            flex-direction: column;  /* 移动端：垂直排列 */
            gap: 10px;
            list-style: none;
        }

        .nav-list a {
            color: white;
            text-decoration: none;
            padding: 10px;
            display: block;
            text-align: center;
        }

        .nav-list a:hover {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }

        /* 桌面端：导航水平排列 */
        @media (min-width: 768px) {
            .nav-list {
                flex-direction: row;
                justify-content: center;
            }

            .nav-list a {
                padding: 10px 20px;
            }
        }

        /* 拓展：响应式图片 */
        .responsive-img {
            max-width: 100%;  /* 图片不超过容器 */
            height: auto;     /* 保持宽高比 */
            display: block;   /* 消除底部间隙 */
        }

        /* 拓展：移动端隐藏，桌面显示 */
        .desktop-only {
            display: none;
        }

        @media (min-width: 768px) {
            .desktop-only {
                display: block;
            }
        }

        /* 拓展：打印样式 */
        @media print {
            .nav, .desktop-only {
                display: none;
            }

            body {
                font-size: 12pt;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <ul class="nav-list">
            <li><a href="#">首页</a></li>
            <li><a href="#">产品</a></li>
            <li><a href="#">服务</a></li>
            <li><a href="#">关于</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>响应式布局示例</h1>
        <p>调整浏览器窗口大小查看效果。在桌面端显示3列，平板显示2列，手机显示1列。</p>

        <div class="card-list">
            <div class="card">
                <h2>卡片1</h2>
                <p>这是卡片内容。使用Flexbox的flex-wrap和flex属性实现响应式。</p>
            </div>
            <div class="card">
                <h2>卡片2</h2>
                <p>媒体查询@media用于在不同断点应用不同样式。</p>
            </div>
            <div class="card">
                <h2>卡片3</h2>
                <p>移动优先策略：先写移动端样式，再用min-width扩展。</p>
            </div>
        </div>

        <div class="desktop-only" style="margin-top: 30px; padding: 20px; background: #e8f5e9;">
            <p>👆 这段内容只在桌面端（≥768px）显示</p>
        </div>
    </div>
</body>
</html>
