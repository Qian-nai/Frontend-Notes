<!-- 练习4答案：Flexbox布局 -->
<!-- 核心知识点：
  Flexbox（弹性盒子）是CSS3引入的一维布局模型。

  核心概念：
  - 主轴（main axis）：Flex项目排列的主要方向（默认水平从左到右）
  - 交叉轴（cross axis）：垂直于主轴的方向（默认垂直从上到下）
  - Flex容器：设置了display: flex的元素
  - Flex项目：Flex容器的直接子元素

  容器属性（在父元素上设置）：

  1. display: flex | inline-flex
     开启Flexbox布局

  2. flex-direction: row | row-reverse | column | column-reverse
     主轴方向：水平（默认）、水平反向、垂直、垂直反向

  3. justify-content（主轴对齐）：
     - flex-start（默认）：左对齐
     - flex-end：右对齐
     - center：居中
     - space-between：两端对齐，项目间等距
     - space-around：每个项目两侧等距
     - space-evenly：均匀分布

  4. align-items（交叉轴对齐）：
     - stretch（默认）：拉伸填满
     - flex-start：顶部对齐
     - flex-end：底部对齐
     - center：垂直居中
     - baseline：基线对齐

  5. flex-wrap: nowrap | wrap | wrap-reverse
     是否换行

  6. gap: 10px | 10px 20px
     项目间距（row-gap column-gap）

  项目属性（在子元素上设置）：

  7. flex: grow shrink basis
     简写属性，控制项目如何伸缩
     - flex-grow：放大比例（默认0）
     - flex-shrink：缩小比例（默认1）
     - flex-basis：基础大小（默认auto）
     常用值：
     - flex: 1（等分剩余空间）
     - flex: 0 0 200px（不伸缩，固定200px）
     - flex: 1 1 auto（可伸缩，基础大小auto）

  8. align-self：单独设置某个项目的对齐方式

  使用场景：
  - 导航栏横向排列
  - 卡片列表
  - 居中布局
  - 侧边栏+内容区
  - 底部固定
-->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox练习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        h2 {
            margin: 30px 0 15px;
            color: #2c3e50;
        }

        /* 示例1：两端对齐 */
        .container {
            display: flex;
            justify-content: space-between;  /* 两端对齐 */
            gap: 20px;  /* 项目间距 */
            background: #ecf0f1;
            padding: 20px;
            margin-bottom: 20px;
        }

        .item {
            background: #3498db;
            color: white;
            padding: 20px;
            text-align: center;
            flex: 1;  /* 等分空间 */
        }

        /* 示例2：垂直水平居中 */
        .center-container {
            display: flex;
            justify-content: center;  /* 水平居中 */
            align-items: center;      /* 垂直居中 */
            height: 200px;
            background: #ecf0f1;
        }

        /* 示例3：导航栏 */
        .nav {
            display: flex;
            justify-content: space-around;  /* 均匀分布 */
            background: #2c3e50;
            padding: 15px;
        }

        .nav a {
            color: white;
            text-decoration: none;
            padding: 5px 15px;
            transition: background 0.3s;
        }

        .nav a:hover {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }

        /* 示例4：卡片列表（自动换行） */
        .card-list {
            display: flex;
            flex-wrap: wrap;  /* 允许换行 */
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            flex: 1 1 200px;  /* 可伸缩，基础宽度200px */
        }

        /* 拓展：常见布局模式 */

        /* 侧边栏+内容区 */
        .layout {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .sidebar {
            flex: 0 0 200px;  /* 固定200px，不伸缩 */
            background: #34495e;
            color: white;
            padding: 20px;
        }

        .content {
            flex: 1;  /* 占据剩余空间 */
            background: #ecf0f1;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h2>示例1：两端对齐</h2>
    <div class="container">
        <div class="item">项目1</div>
        <div class="item">项目2</div>
        <div class="item">项目3</div>
    </div>

    <h2>示例2：垂直水平居中</h2>
    <div class="center-container">
        <div class="item">居中内容</div>
    </div>

    <h2>示例3：导航栏</h2>
    <nav class="nav">
        <a href="#">首页</a>
        <a href="#">产品</a>
        <a href="#">服务</a>
        <a href="#">关于</a>
    </nav>

    <h2>示例4：卡片列表（自动换行）</h2>
    <div class="card-list">
        <div class="card">卡片1</div>
        <div class="card">卡片2</div>
        <div class="card">卡片3</div>
        <div class="card">卡片4</div>
    </div>

    <h2>拓展：侧边栏布局</h2>
    <div class="layout">
        <aside class="sidebar">侧边栏<br>固定200px</aside>
        <main class="content">主内容区<br>自适应剩余空间</main>
    </div>
</body>
</html>
